# Local stack: Postgres+pgvector + the API. `docker compose up` and you're live.
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: ragdemo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d ragdemo"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build: .
    environment:
      STORE: postgres
      DATABASE_URL: postgresql://rag:rag@db:5432/ragdemo
      LLM_PROVIDER: ${LLM_PROVIDER:-auto}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      EMBED_PROVIDER: ${EMBED_PROVIDER:-auto}
      FASTEMBED_MODEL: ${FASTEMBED_MODEL:-BAAI/bge-small-en-v1.5}
      EMBED_DIM: ${EMBED_DIM:-1536}
    ports:
      - "8000:8000"
    volumes:
      - model_cache:/root/.cache
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  model_cache:
